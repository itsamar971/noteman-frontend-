<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>NoteMan - Your Academic Resource Repository</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bungee&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <!-- Apply dark mode before React loads to prevent flash -->
    <script>
      (function() {
        document.documentElement.classList.add('dark');
        localStorage.setItem('noteman-theme', 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
